```yaml
name: Update Wheeling Events Feed

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 10:17 AM UTC.
    # That is 6:17 AM Eastern during daylight saving time
    # and 5:17 AM Eastern during standard time.
    - cron: "17 10 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  # Scraper behavior
  ENABLE_CVB_FEED: "0"
  REQUEST_TIMEOUT_SECONDS: "30"
  DETAIL_TIMEOUT_SECONDS: "45"
  REQUEST_RETRIES: "3"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build calendar feed
        run: |
          mkdir -p public
          python src/build_feed.py \
            --output public/wheeling-events.ics \
            --debug \
            --dump-links public/discovered-links.txt \
            --dump-skipped public/skipped-events.txt

      - name: Add simple index page
        run: |
          cat > public/index.html <<'EOF'
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>Wheeling Events Feed</title>
            </head>
            <body>
              <h1>Wheeling Events Feed</h1>
              <ul>
                <li><a href="./wheeling-events.ics">Calendar feed</a></li>
                <li><a href="./discovered-links.txt">Discovered event links</a></li>
                <li><a href="./skipped-events.txt">Skipped events debug log</a></li>
              </ul>
            </body>
          </html>
          EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
```
